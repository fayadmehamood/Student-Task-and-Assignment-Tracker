name: Build and Push Docker Container

# Tell the robot to wake up only when you push code to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # Give the robot secure permission to upload files to your GitHub account
    permissions:
      contents: read
      packages: write

    steps:
      # Step A: Download your code (the HTML and the Dockerfile)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step B: Log the robot into the GitHub Container Warehouse
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # This is a magical password GitHub creates automatically for security!
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step C: Read the Dockerfile, bake the container, and upload it
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This tags your container with your exact repository name
          tags: ghcr.io/${{ github.repository_owner }}/edutrack-pro:latest
